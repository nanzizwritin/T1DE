<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="/static/style.css"><title>Add from photo</title></head>
<body class="patient">
  {% with messages = get_flashed_messages() %}
    {% for m in messages %}<p style="color:red">{{ m }}</p>{% endfor %}
  {% endwith %}
  <p><a href="/patient">← back</a></p>
  <h1>Add from photo</h1>
  <form method="POST" action="/patient/new" enctype="multipart/form-data">
    <input type="file" name="photo" accept="image/*">
    <label>
      Insulin columns on this sheet:
      <select name="insulin_cols">
        <option value="5">5</option>
        <option value="4">4</option>
      </select>
    </label>
    <button type="submit">Upload</button>
  </form>
</body>
</html>
