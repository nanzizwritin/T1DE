<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="/static/style.css"><title>Patients</title></head>
<body>
  {% with messages = get_flashed_messages() %}
    {% for m in messages %}<p style="color:red">{{ m }}</p>{% endfor %}
  {% endwith %}

  <p><a href="/nurse">← back</a></p>
  <h1>Your patients</h1>

  <ul>
    {% for p in patients %}
      <li>{{ p['patient_id'] }} — {{ p['name'] }} — <a href="/nurse/patient/{{ p['patient_id'] }}">open</a></li>
    {% endfor %}
  </ul>

  <h2>Add a patient</h2>
  <form method="POST" action="/nurse/add_patient">
    <input name="name" placeholder="Name">
    <input name="username" placeholder="Patient username">
    <input name="password" type="password" placeholder="Patient password">
    <button type="submit">Add</button>
  </form>
</body>
</html>
