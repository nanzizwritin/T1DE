<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="/static/style.css"><title>Change password</title></head>
<body>
  {% with messages = get_flashed_messages() %}
    {% for m in messages %}<p style="color:red">{{ m }}</p>{% endfor %}
  {% endwith %}
  <p><a href="/{{ session['role'] }}">← back</a></p>
  <h1>Change password</h1>

  <form method="POST" action="/password">
    <p><input type="password" name="current" placeholder="Current password" required></p>
    <p><input type="password" name="new" placeholder="New password (6+ characters)" required></p>
    <p><input type="password" name="confirm" placeholder="Confirm new password" required></p>
    <button type="submit">Change password</button>
  </form>
</body>
</html>
