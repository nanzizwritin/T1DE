<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="/static/style.css"><title>Patient {{ patient['patient_id'] }}</title></head>
<body class="patient">
  {% with messages = get_flashed_messages() %}
    {% for m in messages %}<p style="color:green">{{ m }}</p>{% endfor %}
  {% endwith %}

  <p><a href="/nurse">← back to patients</a></p>

  <h1>{{ patient['name'] }}</h1>
  <p>Patient ID: {{ patient['patient_id'] }}</p>

  <h2>Actions</h2>
  <p><a href="/nurse/entry/{{ patient['patient_id'] }}">+ Add a record</a></p>
</body>
</html>
