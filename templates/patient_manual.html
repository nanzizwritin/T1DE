<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="/static/style.css">
<title>Add my readings</title>
<style>
  table { font-size: 13px; }
  td input:not([type=date]) { width: 58px; }
  input[type=date] { width: 130px; }
  input[type=number] { width: 60px; }
  .controls { margin-top: 14px; }
  .controls button { margin-right: 6px; }
</style>
</head>
<body class="patient">
  {% with messages = get_flashed_messages() %}
    {% for m in messages %}<p style="color:red">{{ m }}</p>{% endfor %}
  {% endwith %}
  <p><a href="/patient">← back</a></p>
  <h1>Add my readings</h1>

  <form method="POST" action="/patient/manual/save">
    <table id="grid">
      <tr>
        <th>Date</th>
        <th>G-BB</th><th>G-AB</th><th>G-BL</th><th>G-AL</th>
        <th>G-BD</th><th>G-AD</th><th>G-BS</th><th>G-2/3</th>
        <th>I-BB</th><th>I-BL</th><th>I-BD</th><th>I-BS</th><th>I-2/3</th>
      </tr>
      <tr>
        <td><input type="date" name="date"></td>
        {% for c in range(13) %}<td><input name="col{{ c }}"></td>{% endfor %}
      </tr>
    </table>

    <div class="controls">
      Rows: <input type="number" id="rowcount" value="1" min="1">
      <button type="button" onclick="setRows()">Set</button>
      <button type="button" onclick="addRow()">+ Add row</button>
      <button type="button" onclick="fillDates()">Fill dates</button>
      <button type="submit">Save</button>
    </div>
  </form>

<script>
  const table = document.getElementById('grid');
  const template = table.rows[1];

  // format a Date as YYYY-MM-DD in LOCAL time (no UTC shift)
  function fmt(d) {
    return d.getFullYear() + "-" +
           String(d.getMonth() + 1).padStart(2, "0") + "-" +
           String(d.getDate()).padStart(2, "0");
  }
  const TODAY = fmt(new Date());

  function blankRow() {
    const row = template.cloneNode(true);
    row.querySelectorAll('input').forEach(inp => inp.value = '');
    return row;
  }
  function addRow() { table.appendChild(blankRow()); }

  function setRows() {
    const n = parseInt(document.getElementById('rowcount').value) || 1;
    while (table.rows.length > 1) table.deleteRow(1);
    for (let i = 0; i < n; i++) table.appendChild(blankRow());
  }

  function fillDates() {
    const dates = Array.from(table.querySelectorAll('input[type=date]'));

    let anchor = -1;
    for (let i = 0; i < dates.length; i++) {
      if (dates[i].value) { anchor = i; break; }
    }
    if (anchor === -1) { alert("Type one date first, then click Fill dates."); return; }

    if (dates[anchor].value > TODAY) {
      alert("That date is in the future — enter today or a past date.");
      return;
    }

    const base = new Date(dates[anchor].value + "T00:00:00");
    let hitFuture = false;
    dates.forEach((input, i) => {
      if (i === anchor) return;
      const d = new Date(base);
      d.setDate(d.getDate() + (i - anchor));
      const str = fmt(d);
      if (str > TODAY) { input.value = ''; hitFuture = true; }
      else { input.value = str; }
    });
    if (hitFuture) alert("Some rows would be in the future, so they were left blank. Anchor from a later row to fill those.");
  }
</script>
</body>
</html>
