<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="/static/style.css"><title>Records</title>
<style>
  body { font-family: sans-serif; max-width: 1200px; margin: 2rem auto; }
  table { border-collapse: collapse; font-size: 12px; margin-top: 1rem; }
  th, td { border: 1px solid #ccc; padding: 3px 5px; }
  th { background: #f0f0f0; }
</style>
</head>
<body>
  <p><a href="/nurse">← back</a></p>
  <h1>Records</h1>

  <form method="GET" action="/nurse/records">
    <select name="patient">
      <option value="">All patients</option>
      {% for p in patients %}
        <option value="{{ p['patient_id'] }}" {% if patient == p['patient_id']|string %}selected{% endif %}>{{ p['patient_id'] }} — {{ p['name'] }}</option>
      {% endfor %}
    </select>
    <button type="submit">Show</button>
  </form>

  <p>{{ readings|length }} rows</p>
  <table>
    {% if readings %}
      <tr>{% for col in readings[0].keys() %}<th>{{ col }}</th>{% endfor %}</tr>
      {% for r in readings %}
        <tr>{% for col in readings[0].keys() %}<td>{{ r[col] }}</td>{% endfor %}</tr>
      {% endfor %}
    {% else %}
      <tr><td>No records yet.</td></tr>
    {% endif %}
  </table>
</body>
</html>
